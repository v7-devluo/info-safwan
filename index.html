<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base-V7</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        :root {
            --telegram-blue:#007aff;
            --page-bg-light:#e0f2f7;
            --page-bg-dark:#030305;
            --ui-bg:#fff;
            --text-primary:#000;
            --text-secondary:#6d6d72;
            --divider:#e5e5ea
        }

        .footer-rights{
            text-align:center;
            font-size:12.5px;
            padding:16px 10px 18px;
            margin-top:20px;
            border-top:1px solid var(--divider);
            letter-spacing:0.4px;
            background:linear-gradient(90deg,#FFD700,#FFC107,#FFD700);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent
        }

        .footer-rights a{
          color:#ff2fa6;
          text-decoration:none;
          font-weight:600;
          transition:0.25s;

          text-shadow:
          0 0 4px #ff2fa6,
          0 0 8px #ff2fa6,
          0 0 14px #ff1493;
        } 

        .footer-rights a:hover{
            color:#ff4db8;
            text-shadow:
            0 0 6px #ff4db8,
            0 0 12px #ff4db8,
            0 0 18px #ff4db8
        }

        body.dark-mode{
            --ui-bg:#212d3b;
            --text-primary:#fff;
            --text-secondary:#8ea1b7;
            --divider:#2c3a48
        }

        body{
            font-family:'Roboto',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            background-color:var(--page-bg-dark);
            background-image:url(https://i.pinimg.com/originals/85/ec/df/85ecdf1c3642145b063b75da58694433.jpg);
            background-attachment:fixed;
            background-size:cover;
            background-position:center;
            color:var(--text-primary);
            display:flex;
            justify-content:center;
            align-items:flex-start;
            min-height:100vh;
            margin:0;
            padding:40px 20px;
            transition:background-color .3s ease;
            user-select:none
        }

        body:not(.dark-mode){
            background-color:var(--page-bg-light);
            background-image:none
        }

        .iphone-frame{
    width:100%;
    max-width:420px;
    background-color:var(--ui-bg);
    border-radius:40px;

    border:1px solid rgba(0,243,255,0.4);

    overflow:hidden;
    position:relative;
    transition:background-color .3s ease;
}

        .theme-toggle{
            position:absolute;
            top:20px;
            left:20px;
            width:40px;
            height:40px;
            background-color:rgba(128,128,128,.2);
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            cursor:pointer;
            font-size:20px;
            color:var(--text-secondary);
            z-index:10;
            backdrop-filter:blur(5px);
            border:1px solid rgba(128,128,128,.1)
        }

        .theme-toggle .bi-sun-fill{display:none}
        .dark-mode .theme-toggle .bi-sun-fill{display:inline-block}
        .dark-mode .theme-toggle .bi-moon-stars-fill{display:none}

        .profile-content{
            padding:15px;
            margin:0 15px 15px;
            border-radius:12px;
            margin-top:60px
        }

        .profile-header{text-align:center;padding:10px 0}

        .profile-pic{
            width:100px;
            height:100px;
            border-radius:50%;
            object-fit:cover;
            margin-bottom:15px
        }

        .name-container{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:8px
        }

        .name{
            font-size:24px;
            font-weight:700;
            color:var(--text-primary)
        }

        .blue-tick-icon{width:22px;height:22px}

        .status{
            font-size:15px;
            color:var(--telegram-blue);
            margin-top:4px
        }

        .action-buttons{
            display:flex;
            justify-content:space-around;
            padding:20px 0
        }

        .action-btn{
            display:flex;
            flex-direction:column;
            align-items:center;
            text-decoration:none;
            color:var(--telegram-blue)
        }

        .action-btn .icon-bg{
            background-color:var(--telegram-blue);
            color:#fff;
            width:50px;
            height:50px;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:24px;
            margin-bottom:8px
        }

        .action-btn span{
            font-size:13px;
            font-weight:500
        }

        .info-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:14px 16px
        }

        .value.black{color:var(--text-primary)}
        .icon{font-size:24px;color:var(--telegram-blue)}

        .tabs{
            display:flex;
            justify-content:space-around;
            padding:15px 0 0;
            border-bottom:1px solid var(--divider)
        }

        .tab{
            text-decoration:none;
            color:var(--text-secondary);
            font-size:16px;
            font-weight:500;
            padding:0 5px 10px;
            position:relative;
            cursor:pointer
        }

        .tab.active{color:var(--telegram-blue)}

        .tab.active::after{
            content:'';
            position:absolute;
            bottom:-1px;
            left:0;
            right:0;
            height:2px;
            background-color:var(--telegram-blue)
        }

        .tab-content{display:none;padding:15px 5px}
        .tab-content.active{display:block}

        .notification-item,
        .link-card{
            display:flex;
            align-items:center;
            gap:15px;
            background-color:var(--ui-bg);
            padding:15px;
            border-radius:10px;
            text-decoration:none;
            border:1px solid var(--divider);
            color:var(--text-primary);
            margin-bottom:10px
        }

        .notification-item i,
        .link-card i{
            font-size:24px;
            color:var(--telegram-blue)
        }

        .modal-overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,.6);
            display:none;
            justify-content:center;
            align-items:center;
            z-index:1000;
            padding:20px
        }

        .modal-box{
            background:var(--ui-bg);
            color:var(--text-primary);
            padding:25px;
            border-radius:15px;
            max-width:500px;
            width:100%;
            position:relative
        }

        .modal-close-btn{
            position:absolute;
            top:10px;
            right:15px;
            font-size:28px;
            color:var(--text-secondary);
            cursor:pointer;
            border:none;
            background:none
        }

.bg-grad {
  position: fixed;
  inset: 0;
  background:
    linear-gradient(transparent 95%, rgba(0, 243, 255, 0.2) 96%, rgba(0, 243, 255, 0.6) 100%),
    linear-gradient(90deg, transparent 95%, rgba(188, 19, 254, 0.2) 96%, rgba(188, 19, 254, 0.6) 100%);
  background-size: 40px 40px;
  perspective: 500px;
  transform-style: preserve-3d;
  animation: gridMove 20s linear infinite;
  z-index: -2;
  opacity: 0.4;
} 

.profile-header{
    position:relative;
}

.profile-pic{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
}

.avatar-wrap{
    position:relative;
    width:100px;
    height:100px;
    margin:0 auto 15px;
}

.profile-pic{
    position:relative;
    z-index:1;
}

.avatar-wrap::before{
    content:'';
    position:absolute;
    inset:-3.5px;
    border-radius:50%;
    border:2.5px solid transparent;
    border-top-color:#8a2be2;
    border-bottom-color:red;
    animation:avatarSpin 7s linear infinite;
}

@keyframes avatarSpin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

    </style>

</head>

<body class="dark-mode">
<div class="bg-grad"></div>
<div class="iphone-frame">

    <div id="theme-toggle" class="theme-toggle">
        <i class="bi bi-moon-stars-fill"></i>
        <i class="bi bi-sun-fill"></i>
    </div>

    <div class="profile-content">

        <div class="profile-header">

            <div class="avatar-wrap">
                <img src="https://h.top4top.io/p_3831h6mvp0.jpg"
                class="profile-pic">
            </div>

            <div class="name-container">
                <span class="name">V7</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Twitter_Verified_Badge.svg"
                class="blue-tick-icon">
            </div>

            <p class="status">
                ما چانت النيّة حبّ بس والله روحك حلوة
            </p>

        </div>

        <div class="action-buttons">

            <a href="https://t.me/devluo" target="_blank" class="action-btn">
                <div class="icon-bg"><i class="bi bi-telegram"></i></div>
                <span>Me</span>
            </a>

            <a href="#" id="about-btn" class="action-btn">
                <div class="icon-bg"><i class="bi bi-person-circle"></i></div>
                <span>About me</span>
            </a>

            <a href="https://t.me/+bc5j80keHN5iMzhi" target="_blank" class="action-btn">
                <div class="icon-bg"><i class="bi bi-megaphone-fill"></i></div>
                <span>Ch</span>
            </a>

        </div>

        <div class="info-item">

            <div>
                <div class="value black">2006/6/2</div>
                <div style="font-size:13px;color:var(--text-secondary)">Birthday</div>
            </div>

            <i class="bi bi-gift-fill icon"></i>

        </div>

        <div class="tabs">
            <a class="tab active" data-tab="notifications">I love</a>
            <a class="tab" data-tab="links">Links</a>
        </div>

        <div id="notifications" class="tab-content active">

            <div class="notification-item">
                <i class="bi bi-bell-fill"></i>
                <span>أحب كل شي جميل</span>
            </div>

            <div class="notification-item">
                <i class="bi bi-bell-fill"></i>
                <span>مبرمج مبتدئ</span>
            </div>

            <div class="notification-item">
                <i class="bi bi-bell-fill"></i>
                <span>أعمل أي شي للتسليه</span>
            </div>

        </div>

        <div id="links" class="tab-content">

            <a href="https://t.me/voeuBot" target="_blank" class="link-card">
                <i class="bi bi-robot"></i>
                <span>My Bot</span>
            </a>

            <a href="https://t.me/FREENETIRAQo" target="_blank" class="link-card">
                <i class="bi bi-megaphone-fill"></i>
                <span>My Channel</span>
            </a>

            <a href="https://t.me/netfree_iq" target="_blank" class="link-card">
                <i class="bi bi-broadcast"></i>
                <span>My Group</span>
            </a>

        </div>

    </div>

    <div id="about-modal" class="modal-overlay">

        <div class="modal-box">
            <button id="close-modal-btn" class="modal-close-btn">&times;</button>
            <p>Welcome to Base-V7<br><br>
I'm Safwan, a developer<br>
I write code, build things, and experiment with ideas.</p>
        </div>

    </div>

    <div class="footer-rights">
        © 2022 — Developed by
        <a href="https://t.me/devluo" target="_blank">@devluo</a>
    </div>

</div>

<script>

const themeToggle=document.getElementById('theme-toggle');
const body=document.body;

if(localStorage.getItem('theme')==='light'){
body.classList.remove('dark-mode')
}

themeToggle.onclick=()=>{
body.classList.toggle('dark-mode');
localStorage.setItem('theme',
body.classList.contains('dark-mode')?'dark':'light')
};

const tabs=document.querySelectorAll('.tab');
const contents=document.querySelectorAll('.tab-content');

tabs.forEach(tab=>{
tab.onclick=()=>{
const target=tab.getAttribute('data-tab');
tabs.forEach(t=>t.classList.remove('active'));
tab.classList.add('active');
contents.forEach(c=>
c.classList.toggle('active',c.id===target))
}
});

const aboutBtn=document.getElementById('about-btn');
const aboutModal=document.getElementById('about-modal');
const closeModalBtn=document.getElementById('close-modal-btn');

aboutBtn.onclick=e=>{
e.preventDefault();
aboutModal.style.display='flex'
};

closeModalBtn.onclick=()=>{
aboutModal.style.display='none'
};

aboutModal.onclick=e=>{
if(e.target===aboutModal){
aboutModal.style.display='none'
}
};

</script>

</body>
</html>
